services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-analytics-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/crypto.db:/app/crypto.db
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frondend
      dockerfile: Dockerfile
    container_name: crypto-analytics-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    restart: always

volumes:
  db_data:
